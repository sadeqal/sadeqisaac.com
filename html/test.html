<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coherent 3D Camera Flight Simulation</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            overflow: hidden;
        }
        #map-viewport {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        /* Target ONLY the internal WebGL map canvas for Roll rotation */
        .mapboxgl-canvas {
            transition: transform 0.05s linear;
            transform-origin: center center;
        }
        /* HUD UI Overlay */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid #334155;
            padding: 20px;
            border-radius: 8px;
            color: #e2e8f0;
            font-family: monospace;
            z-index: 10;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            min-width: 240px;
        }
        h3 {
            margin: 0 0 15px 0;
            color: #38bdf8;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .telemetry-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .label {
            color: #94a3b8;
        }
        .value {
            color: #f1f5f9;
            font-weight: bold;
        }
        .btn-container {
            margin-top: 15px;
        }
        button {
            background: #0284c7;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            width: 100%;
        }
        button:hover {
            background: #0369a1;
        }
        /* Camera Crosshair overlay */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: 5;
            border: 2px dashed rgba(56, 189, 248, 0.4);
            border-radius: 50%;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(56, 189, 248, 0.7);
        }
        #crosshair::before { top: 29px; left: -10px; width: 80px; height: 2px; }
        #crosshair::after { top: -10px; left: 29px; width: 2px; height: 80px; }
    </style>
</head>
<body>
    
    <div id="crosshair"></div>
    
    <div id="hud">
        <h3>Gimbal Camera HUD</h3>
        <div class="telemetry-row"><span class="label">ALT (Altitude):</span><span class="value" id="hud-alt">100.0 m</span></div>
        <div class="telemetry-row"><span class="label">YAW (Heading):</span><span class="value" id="hud-yaw">0.0°</span></div>
        <div class="telemetry-row"><span class="label">PITCH:</span><span class="value" id="hud-pitch">0.0°</span></div>
        <div class="telemetry-row"><span class="label">ROLL (Bank):</span><span class="value" id="hud-roll">0.0°</span></div>
        <div class="telemetry-row"><span class="label">LAT:</span><span class="value" id="hud-lat">--</span></div>
        <div class="telemetry-row"><span class="label">LNG:</span><span class="value" id="hud-lng">--</span></div>
        <div class="btn-container">
            <button id="simBtn" onclick="toggleSimulation()">Start Coherent Simulation</button>
        </div>
    </div>
    
    <div id="map-viewport">
        <div id="map"></div>
    </div>
    
    <script>
        mapboxgl.accessToken = 'pk.eyJ1Ijoic2FkZXFhbCIsImEiOiJjbDA0ZHBpZDgwYjl5M2Rud2wweDVhaWVtIn0.PSwxdzBQL8ZCh0kYT4UA9g';
        
        // Flight coordinates setup
        let currentLat = -34.6037; 
        let currentLng = -58.3816;
        let baseYaw = 45; // Base flight direction line (North-East)
        
        let isAnimating = false;
        let lastTimestamp = null;
        let animationFrameId = null;
        let flightDistance = 0; // Total track distance covered in meters
        
        const R_EARTH = 6378137;
        let canvasElement = null;
        
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/satellite-streets-v12',
            center: [currentLng, currentLat],
            zoom: 18.5,
            pitch: 0, 
            bearing: baseYaw,
            interactive: false,

            // ADD THIS LINE FOR CRYSTAL CLEAR SAT/HYBRID IMAGES:
            pixelRatio: 2
        });
        
        map.on('load', () => {
            // 1. Grab the internal WebGL canvas for roll rotations
            canvasElement = document.querySelector('.mapboxgl-canvas');
            
            // 2. Add Mapbox's official 3D Terrain mesh layer for mountains/hills elevation
            map.addSource('mapbox-dem', {
                'type': 'raster-dem',
                'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                'tileSize': 512
            });
            map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.0 });
            
            // 3. Inject 3D Building Extrusions from the style vector data
            // This finds the building data layer and pulls up the apartments/towers
            map.addLayer({
                'id': '3d-buildings',
                'source': 'composite',
                'source-layer': 'building',
                'filter': ['==', 'extrude', 'true'],
                'type': 'fill-extrusion',
                'minzoom': 15,
                'paint': {
                    // Give buildings a realistic semi-transparent glass/concrete appearance over the satellite image
                    'fill-extrusion-color': '#aaa',
                    
                    // Map the height of the 3D tower directly to its real world structural telemetry data
                    'fill-extrusion-height': [
                    'interpolate', ['linear'], ['zoom'],
                    15, 0,
                    15.05, ['get', 'height']
                    ],
                    'fill-extrusion-base': [
                    'interpolate', ['linear'], ['zoom'],
                    15, 0,
                    15.05, ['get', 'min_height']
                    ],
                    'fill-extrusion-opacity': 0.6
                }
            });
            
            updateHUD(currentLat, currentLng, 100, baseYaw, 0, 0);
        });
        
        function altitudeToZoom(alt) {
            return 18.5 - Math.log2(alt / 100);
        }
        
        function simulationLoop(timestamp) {
            if (!isAnimating) return;
            
            if (!lastTimestamp) lastTimestamp = timestamp;
            const deltaTime = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;
            
            // 1. Move forward at a constant 8 m/s speed
            const speedMs = 8;
            const distanceThisFrame = speedMs * deltaTime;
            flightDistance += distanceThisFrame;
            
            // 2. Coherent Telemetry Generation along the line
            // Instead of random tracking, attributes now scale smoothly over total distance
            
            // Altitude dips down to 70m, scales up to 130m over a 500m cycle waves
            const simAlt = 100 + Math.sin(flightDistance * 0.015) * 30;
            
            // The plane drifts its nose left/right (Yaw) dynamically over its route
            const yawDrift = Math.sin(flightDistance * 0.01) * 10;
            const currentYaw = baseYaw + yawDrift;
            
            // Pitch climbs up/down seamlessly when entering altitudes shifts
            // Derivative proxy: pitch changes based on the slope of our altitude wave
            const simPitch = Math.cos(flightDistance * 0.015) * 15;
            
            // Roll angles bank dynamically into heading/yaw changes (coordinated turn mechanics)
            const simRoll = Math.cos(flightDistance * 0.01) * 20;
            
            // 3. Ground Coordinate Displacement updates
            const yawRad = currentYaw * Math.PI / 180;
            const dn = distanceThisFrame * Math.cos(yawRad);
            const de = distanceThisFrame * Math.sin(yawRad);
            
            currentLat += (dn / R_EARTH) * (180 / Math.PI);
            currentLng += (de / (R_EARTH * Math.cos(currentLat * Math.PI / 180))) * (180 / Math.PI);
            
            // 4. Update the Map Camera Viewport
            const mapboxPitch = Math.abs(simPitch);
            let adjustedBearing = currentYaw;
            if (simPitch < 0) {
                adjustedBearing = (currentYaw + 180) % 360;
            }
            
            map.jumpTo({
                center: [currentLng, currentLat],
                zoom: altitudeToZoom(simAlt),
                bearing: adjustedBearing,
                pitch: mapboxPitch
            });
            
            // 5. Apply Roll rotation EXCLUSIVELY to the WebGL canvas texture
            if (canvasElement) {
                canvasElement.style.transform = `scale(1.4) rotate(${-simRoll}deg)`;
            }
            
            updateHUD(currentLat, currentLng, simAlt, currentYaw, simPitch, simRoll);
            
            animationFrameId = requestAnimationFrame(simulationLoop);
        }
        
        function toggleSimulation() {
            const btn = document.getElementById('simBtn');
            if (isAnimating) {
                isAnimating = false;
                cancelAnimationFrame(animationFrameId);
                lastTimestamp = null;
                btn.textContent = "Resume Simulation";
                btn.style.background = "#0284c7";
            } else {
                isAnimating = true;
                btn.textContent = "Freeze Simulation";
                btn.style.background = "#dc2626";
                animationFrameId = requestAnimationFrame(simulationLoop);
            }
        }
        
        function updateHUD(lat, lng, alt, yaw, pitch, roll) {
            document.getElementById('hud-lat').textContent = lat.toFixed(6);
            document.getElementById('hud-lng').textContent = lng.toFixed(6);
            document.getElementById('hud-alt').textContent = alt.toFixed(1) + ' m';
            document.getElementById('hud-yaw').textContent = ((yaw % 360 + 360) % 360).toFixed(1) + '°';
            document.getElementById('hud-pitch').textContent = pitch.toFixed(1) + '°';
            document.getElementById('hud-roll').textContent = roll.toFixed(1) + '°';
        }
    </script>
</body>
</html>
