<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVS 3D Flight Simulator Viewport</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dataflash-parser@1.0.0/dist/dataflash-parser.min.js"></script>
    
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #06b6d4;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #090d16; color: #f8fafc; overflow: hidden;
        }

        /* Full Screen Drop/Upload UI */
        .upload-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, #1e1b4b 0%, #090d16 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s ease;
        }
        .upload-overlay.fade-out {
            opacity: 0; pointer-events: none; transform: scale(1.02);
        }
        .upload-box {
            background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px);
            border: 2px dashed rgba(6, 182, 212, 0.3); padding: 3.5rem;
            border-radius: 1.5rem; text-align: center; max-width: 450px; width: 85%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transition: border-color 0.3s;
        }
        .upload-box:hover { border-color: var(--accent); }
        .upload-box h2 { margin: 0 0 0.5rem 0; font-size: 1.75rem; letter-spacing: -0.025em; }
        .upload-box p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
        
        .file-btn {
            background: linear-gradient(135deg, #0891b2, #0284c7);
            color: white; padding: 0.75rem 2rem; border-radius: 0.75rem;
            font-weight: 600; cursor: pointer; display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .file-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(6, 182, 212, 0.3); }
        input[type="file"] { display: none; }

        /* Loader Animation */
        .loader-spin {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 1.5rem auto 0; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Full Page Simulation Viewport Container */
        .flight-sim-container {
            position: relative; width: 100vw; height: 100vh;
        }

        /* Top Center View Controller Switcher */
        .view-switcher {
            position: absolute; top: 1.5rem; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 0.5rem;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            padding: 0.35rem; border-radius: 0.85rem; border: 1px solid var(--glass-border);
        }
        .view-btn {
            background: transparent; border: none; color: #94a3b8;
            padding: 0.5rem 1.25rem; font-size: 0.85rem; font-weight: 500;
            border-radius: 0.6rem; cursor: pointer; transition: all 0.2s;
        }
        .view-btn:hover { color: #fff; }
        .view-btn.active { background: rgba(255, 255, 255, 0.1); color: #fff; }

        /* Right Middle PFD Panel Overlays */
        .pfd-overlay-container {
            position: absolute; right: 2rem; top: 50%; transform: translateY(-50%);
            z-index: 10; background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); padding: 1rem; border-radius: 1.25rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); text-align: center;
        }
        #pfdCanvas {
            background: #1e293b; border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.05);
        }
        .pfd-stats-mini {
            display: flex; justify-content: space-around; margin-top: 0.75rem;
            font-family: 'Courier New', monospace; font-weight: bold; font-size: 0.9rem;
        }
        .stat-lbl { color: #64748b; font-size: 0.75rem; margin-bottom: 0.1rem; }

        /* Bottom Playback Track Control Bar */
        .playback-timeline-toolbar {
            position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 900px; z-index: 10;
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); padding: 0.85rem 1.5rem;
            border-radius: 1.25rem; display: flex; align-items: center; gap: 1.25rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4);
        }
        .control-icon-btn {
            background: none; border: none; font-size: 1.5rem; cursor: pointer;
            color: #fff; padding: 0; display: flex; align-items: center;
            transition: transform 0.1s;
        }
        .control-icon-btn:active { transform: scale(0.9); }
        .timestamp-display {
            font-family: monospace; font-size: 0.85rem; color: #94a3b8; min-width: 45px;
        }
        .timeline-slider {
            flex-grow: 1; -webkit-appearance: none; appearance: none;
            background: rgba(255, 255, 255, 0.1); height: 6px; border-radius: 3px; outline: none;
        }
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
            border-radius: 50%; background: var(--accent); cursor: pointer;
            box-shadow: 0 0 10px var(--accent);
        }
    </style>
</head>
<body>

    <!-- Upload Landing State Screen -->
    <div class="upload-overlay" id="uploadLayer">
        <div class="upload-box">
            <h2>Cargar Archivo de Vuelo</h2>
            <p>Selecciona un archivo binario (.bin) de ArduPilot para renderizar el simulador y la trayectoria 3D.</p>
            <label class="file-btn" for="binFileInput">
                Buscar archivo .bin
            </label>
            <input type="file" id="binFileInput" accept=".bin,.BIN" onchange="handleFileLoading(this)">
            <div class="loader-spin" id="uploadSpinner"></div>
        </div>
    </div>

    <!-- Active Flight Simulator Screen Area -->
    <div class="flight-sim-container">
        
        <div class="view-switcher">
            <button class="view-btn active" id="btn-inclined" onclick="switchView('inclined')">📐 3D Inclined</button>
            <button class="view-btn" id="btn-downward" onclick="switchView('downward')">🛩️ Downward</button>
            <button class="view-btn" id="btn-default" onclick="switchView('default')">🌐 Default</button>
        </div>

        <div id="simMap" style="width: 100%; height: 100vh;"></div>

        <div class="pfd-overlay-container">
            <canvas id="pfdCanvas" width="180" height="180"></canvas>
            <div class="pfd-stats-mini">
                <div><div class="stat-lbl">ALT</div><span id="pfd-alt" style="color: #22c55e;">0.0m</span></div>
                <div><div class="stat-lbl">HDG</div><span id="pfd-hdg" style="color: #eab308;">000°</span></div>
            </div>
        </div>

        <div class="playback-timeline-toolbar">
            <button id="playPauseBtn" class="control-icon-btn" onclick="toggleFlightSimulation()">▶️</button>
            <span class="timestamp-display" id="currentTimeStamp">00:00</span>
            <input type="range" id="timelineSlider" class="timeline-slider" min="0" max="100" value="0" step="1" oninput="onTimelineSliderChange(this.value)" onmousedown="isUserInteractingWithSlider=true" onmouseup="isUserInteractingWithSlider=false">
            <span class="timestamp-display" id="totalDurationStamp">00:00</span>
        </div>

    </div>

    <!-- Script connection entry points -->
    <script src="../scripts/sim.js"></script>
    <script src="../scripts/ardupilotParser.js"></script>
</body>
</html>
